name: CI

on:
  push:
    branches:
      - main
      - "campaign/**/integration"
  pull_request:
    branches:
      - main
      - "campaign/**/integration"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Image PostgreSQL 15 + extension pgvector précompilée : la migration
        # 20260721090000_add_pgvector_rag exécute CREATE EXTENSION vector.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: wellneuro_ci
          POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=en_US.UTF-8
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/wellneuro_ci
      NEXTAUTH_SECRET: ci-test-secret-r8-2-playwright-automation
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          # Nécessaire pour comparer le diff à sa base et détecter une PR
          # purement documentaire (étape « Périmètre du diff » ci-dessous).
          fetch-depth: 0

      # Le nom du job reste `verify` : les règles de protection de branche
      # continuent d'exiger exactement ce check, quel que soit le périmètre.
      # Une PR documentaire n'a aucune raison d'installer des navigateurs et de
      # rejouer les E2E — mais elle DOIT rester soumise à l'anti-secrets (un
      # secret se colle aussi bien dans un .md) et à l'audit des campagnes (une
      # modification documentaire est précisément ce qui casse les invariants de
      # miroir). Ces deux contrôles restent donc inconditionnels.
      - name: Périmètre du diff
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # Base inconnue (première poussée d'une branche, historique tronqué) :
          # on ne devine pas, on traite le diff comme du code.
          if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "Base '${base}' introuvable → périmètre traité comme code."
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          fichiers="$(git diff --name-only "$base" HEAD)"
          echo "Fichiers modifiés :"
          echo "$fichiers"
          # Volontairement PAS `grep -qv` : le grep BSD (macOS) en rend un statut
          # faux, ce qui rendrait cette logique invérifiable en local même si
          # elle passe sous le grep GNU du runner. On matérialise la liste.
          hors_docs="$(printf '%s\n' "$fichiers" | grep -vE '(^docs/|\.md$)' || true)"
          if [ -z "$fichiers" ] || [ -n "$hors_docs" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Diff purement documentaire — étapes de build et E2E sautées."
          fi

      - name: Anti-secrets scan
        run: bash scripts/check_no_secrets.sh

      - name: Campaign rules audit (blocking)
        run: node scripts/wn-campaign-audit.mjs --fail-on-warning-codes missing_audit_root,missing_in_mirror,extra_in_mirror,status_drift_between_roots,closed_campaign_with_open_lots,inflight_without_active_lot,idle_with_active_fields

      # Protège la logique clinique : les 63 questionnaires doivent rester
      # conformes à leurs fixtures de scoring certifiées.
      - name: Scoring certification (63 questionnaires, blocking)
        run: node scripts/check_questionnaire_certification.js

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.docs_only != 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npm ci

      - name: Generate Prisma client
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npx prisma generate

      - name: Setup database schema
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npx prisma migrate deploy

      # Gate avant déploiement : en production, seul le SQL des migrations
      # committées est appliqué (web/scripts/vercel-build.sh). Si schema.prisma
      # a évolué sans migration, le client Prisma déployé attendrait un schéma
      # que la base n'aura jamais. La base CI vient d'être construite uniquement
      # par `migrate deploy` : l'introspecter (--from-config-datasource lit
      # DATABASE_URL) équivaut à rejouer les migrations. Échec (code 2) si elle
      # diverge de schema.prisma.
      - name: Migration drift check (schema.prisma vs migrations)
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: |
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --exit-code

      - name: C5 LOT-02 migration contract
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npx prisma db execute --file prisma/checks/c5_ciqual_reference_v1.sql

      - name: RAG claim decisions journal contract
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npx prisma db execute --file prisma/checks/rag_claim_decisions_journal_v1.sql

      - name: C5 LOT-02 import contract
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        env:
          WN_C5_CIQUAL_DESTRUCTIVE_TEST: wellneuro_ci
        run: npm run c5:ciqual:test-integration

      - name: Seed test data
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npm run prisma:seed

      - name: Type-check
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log

      # Le log complet du type-check est conservé en artefact : le tronquage
      # des annotations GitHub masquait des erreurs TS sur les gros diffs.
      - name: Upload type-check diagnostics
        if: always() && steps.scope.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: web/typecheck.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Unit tests (Vitest)
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npm run test

      - name: Lint
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npm run lint

      - name: Build
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npm run build

      # Installation des navigateurs placée juste avant les E2E, et non en tête
      # de job : tout échec statique (type-check, Vitest, lint, build) rendait
      # sinon la main après avoir payé ~1 min de téléchargement inutile.
      - name: Cache navigateurs Playwright
        if: steps.scope.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium webkit

      # E2E contre le build de production produit plus haut : plus rapide (pas
      # de compilation à la demande de next dev) et plus fidèle au déploiement
      # Vercel (bundles React prod, prerender identique).
      - name: E2E tests (Playwright, production build)
        if: steps.scope.outputs.docs_only != 'true'
        working-directory: web
        env:
          PLAYWRIGHT_WEB_SERVER: start
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.scope.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
