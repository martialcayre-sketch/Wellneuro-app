name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  devcontainer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Dev Container configuration
        run: npx --yes @devcontainers/cli read-configuration --workspace-folder .

      - name: Build and start Dev Container (smoke)
        run: npx --yes @devcontainers/cli up --workspace-folder . --skip-post-create

  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: wellneuro_ci
          POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=en_US.UTF-8
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/wellneuro_ci
      NEXTAUTH_SECRET: ci-test-secret-r8-2-playwright-automation
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Anti-secrets scan
        run: bash scripts/check_no_secrets.sh

      - name: Campaign rules audit (blocking)
        run: node scripts/wn-campaign-audit.mjs --fail-on-warning-codes missing_audit_root,missing_in_mirror,extra_in_mirror,status_drift_between_roots,closed_campaign_with_open_lots,inflight_without_active_lot,idle_with_active_fields

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium webkit

      - name: Generate Prisma client
        working-directory: web
        run: npx prisma generate

      - name: Setup database schema
        working-directory: web
        run: npx prisma migrate deploy

      - name: Seed test data
        working-directory: web
        run: npm run prisma:seed

      - name: Type-check
        working-directory: web
        run: npm run type-check

      - name: Unit tests (Vitest)
        working-directory: web
        run: npm run test

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

      - name: E2E tests (Playwright)
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
