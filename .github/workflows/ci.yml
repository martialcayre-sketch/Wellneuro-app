name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/wellneuro_ci
      NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-prod
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Anti-secrets scan
        run: bash scripts/check_no_secrets.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate Prisma client
        working-directory: web
        run: npx prisma generate

      - name: Type-check
        working-directory: web
        run: npm run type-check

      - name: Unit tests (Vitest)
        working-directory: web
        run: npm run test

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build
